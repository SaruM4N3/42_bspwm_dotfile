# Animations for NORMAL windows (open / close / geometry / workspace hide+show).
# hide/show = workspace switch (bspwm unmaps windows, never minimizes them).
	{
        match = "window_type = 'normal'";
        animations = (
            {
                triggers = ["hide"];
                opacity = {
                    curve = "cubic-bezier(0.4,0,0.2,1)";
                    duration = 0.3;
                    start = "window-raw-opacity-before";
                    end = 0;
                };
                offset-x = {
                    curve = "cubic-bezier(0.4,0,0.2,1)";
                    duration = 0.3;
                    start = 0;
                    end = -200;
                };
                blur-opacity = "opacity";
                shadow-opacity = "opacity";
            },
            {
                triggers = ["show"];
                opacity = {
                    curve = "cubic-bezier(0.4,0,0.2,1)";
                    duration = 0.4;
                    start = 0;
                    end = "window-raw-opacity";
                };
                offset-x = {
                    curve = "cubic-bezier(0.4,0,0.2,1)";
                    duration = 0.4;
                    start = 200;
                    end = 0;
                };
            },
            {
                triggers = ["close"];
                opacity = {
                    curve = "cubic-bezier(0,1,1,1)";
                    duration = 0.3;
                    start = "window-raw-opacity-before";
                    end = 0;
                };
                blur-opacity = "opacity";
                shadow-opacity = "opacity";

                scale-x = {
                    curve = "cubic-bezier(0,1.3,1,1)";
                    duration = 0.3;
                    start = 1;
                    end = 0.6;
                };
                scale-y = "scale-x";

                offset-x = "(1 - scale-x) / 2 * window-width";
                offset-y = "(1 - scale-y) / 2 * window-height";

                shadow-scale-x = "scale-x";
                shadow-scale-y = "scale-y";
                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            },

            {
                triggers = ["open"];
                opacity = {
                    curve = "cubic-bezier(0,1,1,1)";
                    duration = 0.5;
                    start = 0;
                    end = "window-raw-opacity";
                };
                blur-opacity = "opacity";
                shadow-opacity = "opacity";

                scale-x = {
                    curve = "cubic-bezier(0,1.3,1,1)";
                    duration = 0.5;
                    start = 0.6;
                    end = 1;
                };
                scale-y = "scale-x";

                offset-x = "(1 - scale-x) / 2 * window-width";
                offset-y = "(1 - scale-y) / 2 * window-height";

                shadow-scale-x = "scale-x";
                shadow-scale-y = "scale-y";
                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            },

            {
                triggers = ["geometry"];
                scale-x = {
                    curve = "cubic-bezier(0,0,0,1)";
                    duration = 0.5;
                    start = "window-width-before / window-width";
                    end = 1;
                };
                scale-x-reverse = {
                    curve = "cubic-bezier(0,0,0,1)";
                    duration = 0.4;
                    start = "window-width / window-width-before";
                    end = 1;
                };
                scale-y = {
                    curve = "cubic-bezier(0,0,0,1)";
                    duration = 0.5;
                    start = "window-height-before / window-height";
                    end = 1;
                };
                scale-y-reverse = {
                    curve = "cubic-bezier(0,0,0,1)";
                    duration = 0.4;
                    start = "window-height / window-height-before";
                    end = 1;
                };
                offset-x = {
                    curve = "cubic-bezier(0,0,0,1)";
                    duration = 0.4;
                    start = "window-x-before - window-x";
                    end = 0;
                };
                offset-y = {
                    curve = "cubic-bezier(0,0,0,1)";
                    duration = 0.4;
                    start = "window-y-before - window-y";
                    end = 0;
                };
                shadow-scale-x = "scale-x";
                shadow-scale-y = "scale-y";
                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            }
        )
    },

# Animations for Rofi launchers.
	{
		match = "class_g = 'Rofi'";
		animations = (
		{
			triggers = ["close", "hide"];
			preset = "disappear";
			duration = 0.30;
			scale = 0.5;
		},
		{
			triggers = ["open", "show"];
			preset = "appear";
			duration = 0.40;
			scale = 0.5;
		}
		)
	},

# Animations for Dunst notifications.
	{
		match = "class_g = 'Dunst'";
		animations = (
		{
			triggers = ["close", "hide"];
			preset = "fly-out";	#-dunst-close-preset
			direction = "up";	#-dunst-close-direction
			duration = 0.30;
		},
		{
			triggers = ["open", "show"];
			preset = "fly-in";	#-dunst-open-preset
			direction = "right";	#-dunst-open-direction
			duration = 0.40;
		}
		)
	},

