[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
format-foreground = ${color.fg}
date-alt = "%a, %d %b %Y"

format = <label>
label = "%time%%date%"
click-right = SetTimezone &

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /

interval = 60
fixed-values = false

format-mounted = <label-mounted>
format-mounted-prefix = "’łĆ"
format-mounted-prefix-padding = 3pt
format-mounted-prefix-foreground = ${color.purple}
label-mounted = "%used%"

format-unmounted = <label-unmounted>
format-unmounted-prefix = "’łĆ"
format-unmounted-prefix-padding = 3pt
label-unmounted = %mountpoint%: not mounted

######################################################

[module/network]
type = internal/network
interface = ${system.sys_network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "’ć½"
format-connected-prefix-padding = 3pt
format-connected-foreground = ${color.green}

speed-unit = ""
label-connected = "%{A1:OpenApps --netmanager:}%netspeed%%{A}"
label-connected-foreground = ${color.amber}

format-disconnected = <label-disconnected>
format-disconnected-prefix = "’ć½"
format-disconnected-prefix-padding = 3pt
format-disconnected-foreground = ${color.red}

label-disconnected = "%{A1:OpenApps --netmanager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <label-volume>
format-volume-prefix = "’Ć©"
format-volume-prefix-padding = 3
format-volume-foreground = ${color.indigo}

label-volume = "%percentage%"
label-volume-foreground = ${color.fg}

format-muted = <label-muted>
format-muted-prefix = "’Ü®"
format-muted-prefix-padding = 3pt
format-muted-foreground = ${color.indigo}
label-muted = "Muted"
label-muted-foreground = ${color.red}

click-right = OpenApps --soundcontrol

######################################################

[module/brightness]
type = custom/script
exec = $HOME/.config/bspwm/bin/Brightness get
interval = 1
format = <label>
format-prefix = "’ā½ "
format-prefix-foreground = ${color.amber}
label = %output%%
scroll-up = $HOME/.config/bspwm/bin/Brightness up
scroll-down = $HOME/.config/bspwm/bin/Brightness down

######################################################

[module/battery]
type = internal/battery
full-at = 99
battery = ${system.sys_battery}
adapter = ${system.sys_adapter}
poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging><label-charging>
format-charging-background = ${color.bg-alt}
label-charging = %percentage%%

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${color.bg-alt}
label-discharging = %percentage%%

format-full = <label-full>
format-full-background = ${color.bg-alt}
format-full-prefix = ’ēĆ
format-full-prefix-padding-right = 3pt
format-full-prefix-background = ${color.bg-alt}
format-full-prefix-font = 2
format-full-prefix-foreground = ${color.green}
label-full = %percentage%%

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = ${color.green}
ramp-capacity-font = 2
ramp-capacity-padding-right = 3pt

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-foreground = ${color.green}
animation-charging-padding-right = 3pt
animation-charging-font = 2
animation-charging-framerate = 700

######################################################

[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true
occupied-scroll = false

format = <label-state>

label-focused =  ¾░«»
label-focused-padding = 1
label-focused-foreground = ${color.yellow}

label-occupied = ¾░ŖĀ
label-occupied-padding = 1
label-occupied-foreground= ${color.blue}

label-urgent = %icon%
label-urgent-padding = 1

label-empty = ¾░æŖ
label-empty-foreground = ${color.grey}
label-empty-padding = 1

label-separator =
label-separator-padding = 0
label-separator-foreground = ${color.bg-alt}

######################################################

[module/updates]
type = custom/ipc

hook-0 = cat $HOME/.cache/Updates.txt 2>/dev/null
initial = 1

format = <label>
format-prefix = "’ü╣ "
format-prefix-foreground = ${color.lime}

label = %output%

click-left = OpenApps --checkupdates
click-right = OpenApps --update

######################################################

[module/launcher]
type = custom/text

label = "¾░Żć"
label-foreground = ${color.blue}

click-left = OpenApps --menu
click-right = RiceSelector

#####################################################

[module/mplayer]
type = custom/text
label = "’Ćü  "
label-foreground = ${color.green}

click-left = OpenApps --player
click-right = OpenApps --music

######################################################

[module/sep]
type = custom/text
label = " "
label-foreground = ${color.bg-alt}

######################################################

[module/cpu_bar]
type = internal/cpu

interval = 0.5

format = <label>
format-prefix = "’ŗø"
format-prefix-padding = 3pt
format-prefix-foreground = ${color.pink}
label = "%percentage%%"

######################################################

[module/memory_bar]
type = internal/memory

interval = 3

format = <label>
format-prefix = "’öĖ"
format-prefix-padding = 3pt
format-prefix-foreground = ${color.amber}
label = "%used%"

######################################################

[module/mpd]
type = custom/script
exec = playerctl metadata --format "{{title}} - {{artist}}" 2>/dev/null | awk '{if(length>30) print substr($0,1,30)"..."; else print}'
exec-if = playerctl status 2>/dev/null | grep -qE "Playing|Paused"
interval = 2
format = <label>
format-prefix = "  "
format-prefix-foreground = ${color.green}
label = "%output%"
label-foreground = ${color.fg}
click-left = playerctl play-pause
scroll-up = playerctl next
scroll-down = playerctl previous

######################################################

[module/mpd_control]
type            = internal/mpd
host            = 127.0.0.1
port            = 6600
interval        = 2

format-online   = <icon-prev><toggle><icon-next>
icon-play               = " %{T2} "
icon-pause              = " %{T2} "
icon-stop               = " %{T2} "
icon-prev               = "%{T2} "
icon-next               = " %{T2}"

icon-play-foreground    = ${color.lime}
icon-pause-foreground   = ${color.lime}
icon-stop-foreground    = ${color.lime}
icon-prev-foreground    = ${color.blue}
icon-next-foreground    = ${color.blue}

format-offline  = <label-offline>
format-offline-foreground = ${color.grey}
label-offline = " No Music"

######################################################

[module/r00t]
type = custom/text
label =  "’ŖĮ"
label-foreground = ${color.cyan}

click-left = OpenApps --usercard

[module/power]
type = custom/text
label = "’Ćæ"
label-foreground = ${color.red}

click-left = OpenApps --powermenu

######################################################

[module/weather]
type = custom/script
exec = Weather wmodule
interval = 900
format = <label>
label = "%output%"
label-background= ${color.bg-alt}

######################################################

[module/tray]
type = internal/tray

format = <tray>
format-background = ${color.bg-alt}
tray-background = ${color.bg-alt}
tray-foreground = ${color.fg}
tray-spacing = 5px
tray-padding = 0px
tray-size = 40%

#####################################################

[module/bluetooth]
type = custom/script
exec = bluetooth-polybar.sh
interval = 3

format = <label>
label = "%output%"
label-padding = 1
click-left = OpenApps --bluetooth

#####################################################

[module/xkeyboard]
type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout>
format-prefix = "’ä£ "
format-prefix-font = 2
format-prefix-foreground = ${color.cyan}

label-layout = %{A1:OpenApps --keyboard:}%layout%%{A}
label-layout-padding = 1

#####################################################

[module/logtime]
type = custom/script
exec = logtime-polybar
interval = 60
label = %output%
label-padding = 1
click-left = logtime-settings &
