filetype: picom

detect:
  filename: "picom.*\\.conf$"

rules:
  # Section dividers ## ----- Foo ----- ##
  - type: "^##.*##$"

  # Line comments
  - comment: "#.*$"

  # Quoted strings (match values, window class names, etc.)
  - constant.string: "\"[^\"]*\""

  # Block-level keywords (blur: rules: animations: etc.)
  - preproc: "^[a-zA-Z][a-zA-Z0-9_-]*\\s*:$"

  # Keys (left side of =) — identifier
  - identifier: "^\\s*[a-zA-Z][a-zA-Z0-9._-]*"

  # Booleans
  - statement: "\\b(true|false)\\b"

  # Hex colors #rrggbb / #aarrggbb
  - constant.string: "#[0-9a-fA-F]\\{3,8\\}"

  # Numbers (with optional unit)
  - constant: "\\b[0-9]+(\\.[0-9]+)?(px|pt|ms|%)?\\b"

  # Operators and logic
  - special: "(=|&&|\\|\\||!=|<=|>=|<|>)"

  # Brackets and braces
  - symbol.brackets: "[{}()\\[\\]]"
